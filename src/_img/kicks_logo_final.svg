<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">KICKS logo</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">KICKS text logo with pop colours and white border on black background</desc>

<defs>
  <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="20%" stop-color="#ffe066"/>
    <stop offset="50%" stop-color="#ff3cac"/>
    <stop offset="80%" stop-color="#7b2fff"/>
    <stop offset="100%" stop-color="#2b0080"/>
  </linearGradient>
  <linearGradient id="stroke-g" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="50%" stop-color="#ff9900"/>
    <stop offset="100%" stop-color="#aa00ff"/>
  </linearGradient>
  <linearGradient id="ul" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00000000"/>
    <stop offset="15%" stop-color="#ffe066"/>
    <stop offset="40%" stop-color="#ff3cac"/>
    <stop offset="65%" stop-color="#7b2fff"/>
    <stop offset="85%" stop-color="#ff3cac"/>
    <stop offset="100%" stop-color="#00000000"/>
  </linearGradient>
  <linearGradient id="border-g" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="30%" stop-color="#ffe066"/>
    <stop offset="60%" stop-color="#ff3cac"/>
    <stop offset="100%" stop-color="#7b2fff"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="12" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sg2">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- BLACK BG -->
<rect width="680" height="280" fill="#000000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- WHITE BORDER (rounded rectangle frame) -->
